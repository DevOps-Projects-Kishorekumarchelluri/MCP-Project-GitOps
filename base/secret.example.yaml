# ─────────────────────────────────────────────────────────────
# DO NOT COMMIT REAL VALUES TO GIT
# Apply this manually on the server with real values:
#
#   kubectl apply -f secret.yaml -n mcp-platform
#
# Or use the one-liner at the bottom of this file.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mcp-secrets
  namespace: mcp-platform
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_WITH_REAL_PASSWORD" # <-- replace with real RDS password
  OPENAI_API_KEY: "sk-CHANGE_ME_WITH_REAL_API_KEY" # <-- replace with real OpenAI API key
  REDIS_PASSWORD: "" # leave empty if no Redis auth
