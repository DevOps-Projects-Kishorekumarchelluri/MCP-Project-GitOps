apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 340640891954.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/auth-service:951ddc6702fab5bfb4875e0b098af8530d20f8c8
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: mcp-config
            - secretRef:
                name: mcp-secrets
            - configMapRef:
                name: auth-service-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
